<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sticker Tracker</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #1f6fe5;
      color: white;
      padding: 20px;
      text-align: center;
    }

    main {
      max-width: 800px;
      margin: auto;
      padding: 16px;
    }

    .card {
      background: white;
      padding: 18px;
      border-radius: 14px;
      margin-bottom: 14px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    button, .file-label {
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    .primary {
      background: #1f6fe5;
      color: white;
    }

    .secondary {
      background: #ddd;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .search-input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-top: 10px;
    }

    .progress-track {
      width: 100%;
      background: #ececec;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      height: 12px;
      width: 0%;
      border-radius: 999px;
      transition: width .25s ease;
    }

    .file-label {
      background: #1f6fe5;
      color: white;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal.active {
      display: flex;
    }

    .modal-card {
      background: white;
      width: 100%;
      max-width: 420px;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    }
  </style>
</head>

<body>

<header>
  <h1>Sticker Tracker</h1>
</header>

<main>

  <div class="card">
    <div class="toolbar">

      <!-- CSV -->
      <label id="csvImportLabel" class="file-label">
        Import CSV
        <input type="file" id="csvInput" accept=".csv" style="display:none;">
      </label>

      <!-- ✅ PAGE IMPORT (THIS IS YOUR BUTTON) -->
      <label id="pageCsvImportLabel" class="secondary">
        Import Pages
        <input type="file" id="pageCsvInput" accept=".csv" style="display:none;">
      </label>

      <button id="findPlayerBtn" class="secondary">Find Player</button>

    </div>
  </div>

  <div class="card">
    <h3>Progress</h3>
    <div id="progressText"></div>
    <div class="progress-track">
      <div id="progressBar" class="progress-fill"></div>
    </div>
  </div>

  <div class="card">
    <h2>All Stickers</h2>

    <div class="toolbar">
      <button onclick="setFilter('all')">All</button>
      <button onclick="setFilter('needed')">Needed</button>
      <button onclick="setFilter('dupes')">Trades</button>
    </div>

    <input id="searchInput" class="search-input" placeholder="Search by code or name">

    <div id="allList" style="margin-top:14px;"></div>
  </div>

</main>

  <div id="modal" class="modal" onclick="closeModal(event)">
    <div class="modal-card" onclick="event.stopPropagation()">

      <div>
        <div id="modalOrg" style="color:#666;"></div>
        <h2 id="modalName"></h2>
        <div id="modalCode" style="color:#999;"></div>

        <!-- PAGE DISPLAY -->
        <div id="modalPage"
            style="
              margin-top:10px;
              font-size:28px;
              font-weight:700;
              color:#1f6fe5;
            ">
        </div>

        <!-- VARIANT BADGE -->
        <div id="modalVariantBadge"
            style="
              margin-top:8px;
              display:none;
              padding:6px 12px;
              border-radius:999px;
              font-size:13px;
              font-weight:600;
            ">
        </div>
      </div>

      <div id="modalStatus" style="margin-top:10px;"></div>

      <!-- CARD TYPE -->
      <div style="margin-top:16px;">
        <div style="
          font-size:13px;
          color:#666;
          margin-bottom:6px;
          font-weight:600;
        ">
          CARD TYPE
        </div>

        <select id="modalVariant"
                onchange="updateVariant(this.value)"
                style="
                  width:100%;
                  padding:10px;
                  border-radius:10px;
                  border:1px solid #ccc;
                  font-size:15px;
                ">
          <option value="White">White (Base)</option>
          <option value="Orange">Orange</option>
          <option value="Blue">Blue</option>
          <option value="Red">Red</option>
          <option value="Purple">Purple</option>
          <option value="Green">Green</option>
          <option value="Black">Black</option>
        </select>
      </div>

    <div style="margin-top:16px;">
      Dupes:
      <button onclick="changeDupes(-1)">-</button>
      <span id="modalDupes"></span>
      <button onclick="changeDupes(1)">+</button>
    </div>

    <div style="margin-top:16px;">
      <button onclick="toggleModal()" class="primary">Toggle</button>
      <button onclick="resetDupes()">Reset</button>
    </div>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
