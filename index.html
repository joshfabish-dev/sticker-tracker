<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sticker Tracker</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;

      background:
        linear-gradient(
          180deg,
          #f7f8fa,
          #edf2f7
        );

      min-height: 100vh;
    }

    header {
      background: linear-gradient(
        135deg,
        #0057B8,
        #E63946
      );

      color: white;
      padding: 24px;
      text-align: center;

      box-shadow:
        0 4px 16px rgba(0,0,0,.15);
    }

    header h1 {
      text-shadow:
        0 2px 6px rgba(0,0,0,.25);
    }

    main {
      max-width: 800px;
      margin: auto;
      padding: 16px;
    }

    .card {
      background: white;
      padding: 18px;
      border-radius: 18px;
      margin-bottom: 14px;

      box-shadow:
        0 4px 14px rgba(0,0,0,.08);

      transition:
        transform .15s ease,
        box-shadow .15s ease;
    }

    button, .file-label {
      padding: 10px 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    .primary {
      background: #0057B8;
      color: white;
    }

    .secondary {
      background: #eef2f7;
      color: #0f172a;

      border: 1px solid #d6dde7;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      flex-wrap: nowrap;

      -webkit-overflow-scrolling: touch;
    }

    .toolbar::-webkit-scrollbar {
      display: none;
    }

    .card:hover {
      transform: translateY(-2px);

      box-shadow:
        0 8px 20px rgba(0,0,0,.10);
    }

    .search-input {
      width: min(400px, 90%);
      display: block;
      margin: 12px auto 0 auto;

      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    .progress-track {
      width: 100%;
      background: #ececec;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      height: 12px;
      width: 0%;
      border-radius: 999px;

      transition: width .25s ease;

      box-shadow:
        0 0 8px rgba(255,255,255,.4);
    }

  

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal.active {
      display: flex;
    }

    .modal-card {
      background: white;

      width: min(95vw, 500px);
      height: 80vh;

      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);

      display: flex;
      flex-direction: column;

      overflow: hidden;
    }

    .modal-header {
      flex-shrink: 0;
      padding: 16px 22px;
      border-bottom: 1px solid #eee;
      background: white;
    }

    .modal-content {
      flex: 1;
      overflow-y: auto;
      padding: 22px;
    }

    .modal-footer {
      flex-shrink: 0;
      padding: 16px 22px;
      border-top: 1px solid #eee;
      background: white;

      display: flex;
      gap: 8px;
    }

    .team-modal-card {
      background: white;

      width: min(95vw, 500px);
      height: 80vh;

      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);

      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .team-modal-header {
      flex-shrink: 0;
      padding: 16px 22px;
      border-bottom: 1px solid #eee;
      background: white;
    }

    .team-modal-content {
      flex: 1;
      overflow-y: auto;
      padding: 22px;
    }

    .team-modal-footer {
      flex-shrink: 0;
      padding: 16px 22px;
      border-top: 1px solid #eee;
      background: white;
      display: flex;
      gap: 8px;
    }

    .file-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .file-label:not(.secondary) {
      background: #0057B8;
      color: white;
    }
  
    #splashScreen {

      position: fixed;
      inset: 0;

      background:
        linear-gradient(
          135deg,
          #0057B8,
          #E63946
        );

      display: flex;
      align-items: center;
      justify-content: center;

      z-index: 99999;

      transition: opacity .5s ease;
    }

    .splash-content {
      text-align: center;
      color: white;
    }

    .ball {

      font-size: 90px;

      filter:
          drop-shadow(
            0 0 12px rgba(255,215,0,.5)
          );

      animation:
        bounce 1.4s infinite,
        pulse 2.5s infinite;
    }

    .splash-title {

      margin-top: 16px;

      font-size: 34px;
      font-weight: 800;
    }

    .splash-subtitle {

      margin-top: 8px;

      opacity: .95;

      font-size: 18px;
    }

    .splash-spacer {
      height: 180px;
    }

    .loading-text {

      margin-bottom: 12px;

      font-size: 14px;
      font-weight: 600;

      letter-spacing: 1px;

      color: #F4C430;

      text-transform: uppercase;
    }


    .splash-progress {

      width: 220px;
      height: 8px;

      background:
        rgba(255,255,255,.25);

      border-radius: 999px;

      overflow: hidden;

      margin-left: auto;
      margin-right: auto;
    }

    @keyframes bounce {

      0%,100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-18px);
      }

    }

    @keyframes pulse {

      0%,100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.08);
      }

    }

    .splash-progress {

      margin-top: 24px;

      width: 220px;
      height: 8px;

      background:
        rgba(255,255,255,.25);

      border-radius: 999px;

      overflow: hidden;

      margin-left: auto;
      margin-right: auto;
    }

    #splashProgressBar {

      width: 0%;
      height: 100%;

      background: #F4C430;

      border-radius: 999px;

      box-shadow:
        0 0 10px rgba(244,196,48,.75);

      transition: width 2.5s linear;
    }


  </style>
</head>

<body>

<div id="splashScreen">

  <div class="splash-content">

    <div class="ball">
      🏆
    </div>

    <div class="splash-title">
      2026 World Cup
    </div>

    <div class="splash-subtitle">
      Collect • Trade • Complete
    </div>

    <div class="splash-spacer"></div>

    <div class="loading-text">
      Loading Collection...
    </div>

    <div class="splash-progress">
      <div id="splashProgressBar"></div>
    </div>

    <div
      style="
        margin-top:12px;
        font-size:12px;
        letter-spacing:1px;
        text-transform:uppercase;
        opacity:.8;
      ">
      FIFA WORLD CUP 2026 STICKER COLLECTION
    </div>

  </div>

</div>

<header>

  <h1 style="margin:0;">
    ⚽ 2026 World Cup Sticker Tracker
  </h1>

  <div
    style="
      margin-top:8px;
      opacity:.9;
      font-size:14px;
    ">
    Collect • Trade • Complete
  </div>

  <div
    style="
      margin-top:12px;
      font-size:12px;
      letter-spacing:1px;
      text-transform:uppercase;
      opacity:.85;
    ">
    FIFA World Cup 2026 Collection
  </div>

</header>

<main>

  <div class="card">
    <div class="toolbar">

      <!-- CSV -->
      <label id="csvImportLabel" class="file-label">
        Import CSV
        <input type="file" id="csvInput" accept=".csv" style="display:none;">
      </label>

      <!-- ✅ PAGE IMPORT (THIS IS YOUR BUTTON) -->
      <label
        id="pageCsvImportLabel"
        class="file-label secondary">
      
        Import Pages
        <input type="file" id="pageCsvInput" accept=".csv" style="display:none;">
      </label>

      <button
        onclick="downloadBackup()"
        class="secondary">
        💾 Backup
      </button>

      <label
        id="restoreLabel"
        class="file-label secondary">

        📂 Restore

        <input
          type="file"
          id="restoreInput"
          accept=".json"
          style="display:none;">
      </label>

    </div>
  </div>

  <div class="card">
    <h2>Sticker Options</h2>

    <div class="toolbar">
      <button onclick="setFilter('all')">All</button>
      <button onclick="setFilter('needed')">Needed</button>
      <button onclick="setFilter('dupes')">Trades</button>
      <button onclick="setFilter('rare')">Rares</button>
      <button onclick="setFilter('progress')"> 📊 Stats </button>
    </div>

    <input id="searchInput" class="search-input" placeholder="Search by code or name">

    <div id="progressSection">

      <div
        id="progressText"
        style="
          margin-top:12px;
          font-weight:600;
        ">
      </div>

      <div
        class="progress-track"
        style="
          margin-top:8px;
          margin-bottom:12px;
        ">

        <div
          id="progressBar"
          class="progress-fill">
        </div>

      </div>

    </div>


    <div id="allList" style="margin-top:14px;"></div>
  </div>

</main>

  <div id="modal" class="modal" onclick="closeModal(event)">
  <div class="modal-card" onclick="event.stopPropagation()">

    <!-- FIXED HEADER -->
    <div class="modal-header">
      <div style="display:flex; justify-content:flex-end;">
        <button
          onclick="closeModal()"
          style="
            background:none;
            border:none;
            font-size:28px;
            font-weight:700;
            color:#666;
            cursor:pointer;
            padding:0;
          ">
          ×
        </button>
      </div>
    </div>

    <!-- SCROLLABLE CONTENT -->
    <div class="modal-content">

      <div id="modalOrg" style="color:#666;"></div>

      <h2 id="modalName"></h2>

      <div id="modalCode" style="color:#999;"></div>

      <!-- PAGE DISPLAY -->
      <div id="modalPage"
           style="
             margin-top:10px;
             font-size:28px;
             font-weight:700;
             color:#0057B8;
           ">
      </div>

      <!-- VARIANT BADGE -->
      <div id="modalVariantBadge"
           style="
             margin-top:8px;
             display:none;
             padding:6px 12px;
             border-radius:999px;
             font-size:13px;
             font-weight:600;
           ">
      </div>

      <div id="modalStatus" style="margin-top:10px;"></div>

      <!-- CARD TYPE -->
      <div style="margin-top:16px;">
        <div style="
          font-size:13px;
          color:#666;
          margin-bottom:6px;
          font-weight:600;
        ">
          CARD TYPE
        </div>

        <select
          id="modalVariant"
          onchange="updateVariant(this.value)"
          style="
            width:100%;
            padding:10px;
            border-radius:10px;
            border:1px solid #ccc;
            font-size:16px;
          ">
          <option value="White">White (Base)</option>
          <option value="Orange">Orange</option>
          <option value="Blue">Blue</option>
          <option value="Red">Red</option>
          <option value="Purple">Purple</option>
          <option value="Green">Green</option>
          <option value="Black">Black</option>
        </select>
      </div>

      <!-- TRADE INVENTORY -->
      <div style="margin-top:16px;">
        <div style="
          font-size:13px;
          color:#666;
          margin-bottom:8px;
          font-weight:600;
        ">
          TRADE INVENTORY
        </div>

        <div id="tradeInventoryRows"></div>
      </div>

    </div>

    <!-- FIXED FOOTER -->
    <div class="modal-footer">

      <button
        onclick="toggleModal()"
        class="primary">
        Toggle
      </button>

      <button
        onclick="resetDupes()">
        Reset Trades
      </button>

    </div>

  </div>
</div>

<!-- TEAM MODAL -->
<div id="teamModal" class="modal" onclick="closeTeamModal(event)">
  <div class="team-modal-card" onclick="event.stopPropagation()">

    <!-- HEADER -->
    <div class="team-modal-header">

      <div style="display:flex; justify-content:flex-end;">
        <button
          onclick="closeTeamModal()"
          style="
            background:none;
            border:none;
            font-size:28px;
            font-weight:700;
            color:#666;
            cursor:pointer;
            padding:0;
          ">
          ×
        </button>
      </div>

      <div
        id="teamModalName"
        style="
          font-size:26px;
          font-weight:700;
        ">
      </div>

      <div
        id="teamModalStats"
        style="
          margin-top:6px;
          color:#666;
        ">
      </div>

    </div>

    <!-- CONTENT -->
    <div class="team-modal-content">
      <div id="teamModalContent"></div>
    </div>

    <!-- FOOTER -->
    <div class="team-modal-footer">

      <button
        onclick="closeTeamModal()"
        class="primary">
        Close
      </button>

    </div>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
