<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sticker Tracker</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #1f6fe5;
      color: white;
      padding: 20px;
      text-align: center;
    }

    main {
      max-width: 800px;
      margin: auto;
      padding: 16px;
    }

    .card {
      background: white;
      padding: 18px;
      border-radius: 14px;
      margin-bottom: 14px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    button {
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    .primary {
      background: #1f6fe5;
      color: white;
    }

    .secondary {
      background: #ddd;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .search-input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-top: 10px;
    }

    .progress-track {
      width: 100%;
      background: #ececec;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      height: 12px;
      width: 0%;
      border-radius: 999px;
      transition: width .25s ease;
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal.active {
      display: flex;
    }

    .modal-card {
      background: white;
      width: 100%;
      max-width: 420px;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      margin-top: 8px;
    }

    .badge-green {
      background: #e6f4ea;
      color: #2e7d32;
    }

    .badge-gray {
      background: #f1f1f1;
      color: #555;
    }
  </style>
</head>
<body>

<header>
  <h1>Sticker Tracker</h1>
</header>

<main>

  <div class="card">
    <div class="toolbar">
      <button id="loadSampleBtn" class="primary">Load Sample Data</button>
      <button id="findPlayerBtn" class="secondary">Find Player</button>
    </div>
  </div>

  <div class="card">
    <h3>Progress</h3>
    <div id="progressText"></div>
    <div class="progress-track">
      <div id="progressBar" class="progress-fill"></div>
    </div>
  </div>

  <div class="card">
    <h2>All Stickers</h2>

    <div class="toolbar">
      <button onclick="setFilter('all')">All</button>
      <button onclick="setFilter('needed')">Needed</button>
      <button onclick="setFilter('dupes')">Trades</button>
    </div>

    <input id="searchInput" class="search-input" placeholder="Search by code or name" />

    <div id="allList" style="margin-top: 14px;"></div>
  </div>

</main>

<!-- MODAL -->
<div id="modal" class="modal" onclick="closeModal(event)">
  <div class="modal-card" onclick="event.stopPropagation()">

  <!-- HEADER -->
  <div style="margin-bottom:14px;">
    <div id="modalOrg" style="color:#6b7280; font-size:14px; font-weight:500;"></div>

    <div style="margin-top:4px; font-size:22px; font-weight:700;">
      <span id="modalName"></span>
    </div>

    <div id="modalCode" style="color:#9ca3af; margin-top:2px;"></div>
  </div>

  <!-- STATUS BADGE -->
  <div id="modalStatus"
       style="
         display:inline-block;
         padding:7px 14px;
         border-radius:999px;
         font-size:14px;
         font-weight:600;
       ">
  </div>

  <!-- DUPLICATES SECTION -->
  <div style="margin-top:22px;">
    <div style="font-size:13px; color:#6b7280; letter-spacing:.3px;">
      DUPLICATES
    </div>

    <div style="
      display:flex;
      align-items:center;
      justify-content:center;
      gap:14px;
      margin-top:10px;
    ">

      <button onclick="changeDupes(-1)" class="secondary"
              style="width:44px; height:44px; font-size:18px;">
        −
      </button>

      <div id="modalDupes"
           style="font-size:24px; font-weight:700; min-width:32px; text-align:center;">
      </div>

      <button onclick="changeDupes(1)" class="secondary"
              style="width:44px; height:44px; font-size:18px;">
        +
      </button>
    </div>
  </div>

  <!-- ACTIONS -->
  <div style="margin-top:26px; display:flex; gap:10px;">
    <button onclick="toggleModal()"
            class="primary"
            style="flex:1; font-weight:600;">
      Toggle Collected
    </button>

    <button onclick="resetDupes()"
            class="secondary"
            style="font-weight:500;">
      Reset
    </button>
  </div>

</div>

</div>

<script src="app.js"></script>
</body>
</html>
