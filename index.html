<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sticker Tracker</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #1f6fe5;
      color: white;
      padding: 20px;
      text-align: center;
    }

    main {
      max-width: 800px;
      margin: auto;
      padding: 16px;
    }

    .card {
      background: white;
      padding: 18px;
      border-radius: 14px;
      margin-bottom: 14px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    button, .file-label {
      padding: 10px 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    .primary {
      background: #1f6fe5;
      color: white;
    }

    .secondary {
      background: #ddd;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      flex-wrap: nowrap;

      -webkit-overflow-scrolling: touch;
    }

    .search-input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-top: 10px;
    }

    .progress-track {
      width: 100%;
      background: #ececec;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      height: 12px;
      width: 0%;
      border-radius: 999px;
      transition: width .25s ease;
    }

    .file-label {
      background: #1f6fe5;
      color: white;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal.active {
      display: flex;
    }

    .modal-card {
      background: white;

      width: min(95vw, 500px);
      height: 80vh;

      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);

      display: flex;
      flex-direction: column;

      overflow: hidden;
    }

    .modal-header {
      flex-shrink: 0;
      padding: 16px 22px;
      border-bottom: 1px solid #eee;
      background: white;
    }

    .modal-content {
      flex: 1;
      overflow-y: auto;
      padding: 22px;
    }

    .modal-footer {
      flex-shrink: 0;
      padding: 16px 22px;
      border-top: 1px solid #eee;
      background: white;

      display: flex;
      gap: 8px;
    }

    .team-modal-card {
      background: white;

      width: min(95vw, 500px);
      height: 80vh;

      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);

      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .team-modal-header {
      flex-shrink: 0;
      padding: 16px 22px;
      border-bottom: 1px solid #eee;
      background: white;
    }

    .team-modal-content {
      flex: 1;
      overflow-y: auto;
      padding: 22px;
    }

    .team-modal-footer {
      flex-shrink: 0;
      padding: 16px 22px;
      border-top: 1px solid #eee;
      background: white;
      display: flex;
      gap: 8px;
    }


  </style>
</head>

<body>

<header>
  <h1>2026 World Cup Sticker Tracker</h1>
</header>

<main>

  <div class="card">
    <div class="toolbar">

      <!-- CSV -->
      <label id="csvImportLabel" class="file-label">
        Import CSV
        <input type="file" id="csvInput" accept=".csv" style="display:none;">
      </label>

      <!-- ✅ PAGE IMPORT (THIS IS YOUR BUTTON) -->
      <label id="pageCsvImportLabel" class="secondary">
        Import Pages
        <input type="file" id="pageCsvInput" accept=".csv" style="display:none;">
      </label>

      <button
        onclick="downloadBackup()"
        class="secondary">
        💾 Backup
      </button>

    </div>
  </div>

  <div class="card">
    <h2>Sticker Options</h2>

    <div class="toolbar">
      <button onclick="setFilter('all')">All</button>
      <button onclick="setFilter('needed')">Needed</button>
      <button onclick="setFilter('dupes')">Trades</button>
      <button onclick="setFilter('rare')">Rares</button>
      <button onclick="setFilter('progress')"> Stats </button>
    </div>

    <input id="searchInput" class="search-input" placeholder="Search by code or name">

    <div id="progressSection">

      <div
        id="progressText"
        style="
          margin-top:12px;
          font-weight:600;
        ">
      </div>

      <div
        class="progress-track"
        style="
          margin-top:8px;
          margin-bottom:12px;
        ">

        <div
          id="progressBar"
          class="progress-fill">
        </div>

      </div>

    </div>


    <div id="allList" style="margin-top:14px;"></div>
  </div>

</main>

  <div id="modal" class="modal" onclick="closeModal(event)">
  <div class="modal-card" onclick="event.stopPropagation()">

    <!-- FIXED HEADER -->
    <div class="modal-header">
      <div style="display:flex; justify-content:flex-end;">
        <button
          onclick="closeModal()"
          style="
            background:none;
            border:none;
            font-size:28px;
            font-weight:700;
            color:#666;
            cursor:pointer;
            padding:0;
          ">
          ×
        </button>
      </div>
    </div>

    <!-- SCROLLABLE CONTENT -->
    <div class="modal-content">

      <div id="modalOrg" style="color:#666;"></div>

      <h2 id="modalName"></h2>

      <div id="modalCode" style="color:#999;"></div>

      <!-- PAGE DISPLAY -->
      <div id="modalPage"
           style="
             margin-top:10px;
             font-size:28px;
             font-weight:700;
             color:#1f6fe5;
           ">
      </div>

      <!-- VARIANT BADGE -->
      <div id="modalVariantBadge"
           style="
             margin-top:8px;
             display:none;
             padding:6px 12px;
             border-radius:999px;
             font-size:13px;
             font-weight:600;
           ">
      </div>

      <div id="modalStatus" style="margin-top:10px;"></div>

      <!-- CARD TYPE -->
      <div style="margin-top:16px;">
        <div style="
          font-size:13px;
          color:#666;
          margin-bottom:6px;
          font-weight:600;
        ">
          CARD TYPE
        </div>

        <select
          id="modalVariant"
          onchange="updateVariant(this.value)"
          style="
            width:100%;
            padding:10px;
            border-radius:10px;
            border:1px solid #ccc;
            font-size:15px;
          ">
          <option value="White">White (Base)</option>
          <option value="Orange">Orange</option>
          <option value="Blue">Blue</option>
          <option value="Red">Red</option>
          <option value="Purple">Purple</option>
          <option value="Green">Green</option>
          <option value="Black">Black</option>
        </select>
      </div>

      <!-- TRADE INVENTORY -->
      <div style="margin-top:16px;">
        <div style="
          font-size:13px;
          color:#666;
          margin-bottom:8px;
          font-weight:600;
        ">
          TRADE INVENTORY
        </div>

        <div id="tradeInventoryRows"></div>
      </div>

    </div>

    <!-- FIXED FOOTER -->
    <div class="modal-footer">

      <button
        onclick="toggleModal()"
        class="primary">
        Toggle
      </button>

      <button
        onclick="resetDupes()">
        Reset Trades
      </button>

    </div>

  </div>
</div>

<!-- TEAM MODAL -->
<div id="teamModal" class="modal" onclick="closeTeamModal(event)">
  <div class="team-modal-card" onclick="event.stopPropagation()">

    <!-- HEADER -->
    <div class="team-modal-header">

      <div style="display:flex; justify-content:flex-end;">
        <button
          onclick="closeTeamModal()"
          style="
            background:none;
            border:none;
            font-size:28px;
            font-weight:700;
            color:#666;
            cursor:pointer;
            padding:0;
          ">
          ×
        </button>
      </div>

      <div
        id="teamModalName"
        style="
          font-size:26px;
          font-weight:700;
        ">
      </div>

      <div
        id="teamModalStats"
        style="
          margin-top:6px;
          color:#666;
        ">
      </div>

    </div>

    <!-- CONTENT -->
    <div class="team-modal-content">
      <div id="teamModalContent"></div>
    </div>

    <!-- FOOTER -->
    <div class="team-modal-footer">

      <button
        onclick="closeTeamModal()"
        class="primary">
        Close
      </button>

    </div>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
